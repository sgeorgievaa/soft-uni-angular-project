  <section class="catalog-container">
    <h2>Herbs Catalog</h2>
  
    <div class="search-box">
      <input 
        type="text"
        placeholder="Search herb..."
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
      />
    </div>

    @if (herbs.length === 0) {
      <p class="no-data">No herbs yet. Be the first to add one.</p>
    } @else {
  
      <div class="card-container">
        @for (herb of herbs; track herb.id) {
          <div class="card">
  
            <img [src]="herb.imageUrl" alt="{{ herb.name }}" />
  
            <h3>{{ herb.name }}</h3>
  
            <p class="benefits">
              {{ herb.benefits }}
            </p>
  
            <a [routerLink]="['/catalog', herb.id]" class="details-btn">
              Details
            </a>
  
          </div>
        }
      </div>
  
    }
  </section>
